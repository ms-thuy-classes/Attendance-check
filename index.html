<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Điểm danh Đồng bộ - Firebase</title>
    
    <!-- Tailwind CSS cho giao diện đẹp -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Thư viện xuất Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- Firebase SDK (Dùng bản Compat để dễ lồng vào HTML) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; touch-action: manipulation; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.5); }
        .sticky-col { position: sticky; left: 0; z-index: 20; background: white; border-right: 2px solid #f1f5f9; }
        .pastel-green { background-color: #dcfce7; color: #166534; }
        .pastel-red { background-color: #fee2e2; color: #991b1b; }
        .pastel-yellow { background-color: #fef9c3; color: #854d0e; }
        select { appearance: none; -webkit-appearance: none; }
    </style>
</head>
<body class="pb-24">

    <!-- HEADER -->
    <div class="p-6 bg-white border-b border-slate-100 sticky top-0 z-30">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-xl font-extrabold text-slate-800">Lớp Anh Trần Thị Anh 🍎</h1>
                <div id="sync-status" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Đang kết nối...</div>
            </div>
            <button onclick="exportToExcel()" class="bg-emerald-500 text-white p-3 rounded-2xl text-sm font-bold shadow-lg shadow-emerald-200">Excel</button>
        </div>
    </div>

    <!-- BỘ LỌC -->
    <div class="p-4 flex gap-2">
        <select id="schedule-select" onchange="updateSettings()" class="flex-1 glass p-3 rounded-2xl text-sm font-semibold outline-none border-none shadow-sm">
            <option value="2-4-6">Lịch Thứ 2-4-6</option>
            <option value="3-5-7">Lịch Thứ 3-5-7</option>
            <option value="all">Cả tuần</option>
        </select>
        <input type="month" id="month-filter" onchange="renderAll()" class="flex-1 glass p-3 rounded-2xl text-sm font-semibold outline-none border-none shadow-sm">
    </div>

    <!-- BẢNG ĐIỂM DANH -->
    <main class="px-4">
        <div class="glass rounded-3xl overflow-hidden shadow-xl overflow-x-auto">
            <table class="w-full text-left border-collapse bg-white">
                <thead>
                    <tr id="table-header" class="bg-slate-50/80">
                        <th class="p-4 text-xs font-bold text-slate-400 sticky-col bg-slate-50 min-w-[140px]">HỌC SINH</th>
                    </tr>
                </thead>
                <tbody id="attendance-body" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </main>

    <!-- QUẢN LÝ HỌC SINH -->
    <div class="p-6 space-y-4">
        <h3 class="font-bold text-slate-800">Danh sách học sinh</h3>
        <div id="student-list" class="grid grid-cols-1 gap-2"></div>
        <div class="flex gap-2">
            <input type="text" id="new-student-name" placeholder="Nhập tên học sinh mới..." class="flex-1 p-4 rounded-2xl glass outline-none text-sm">
            <button onclick="addStudent()" class="px-6 py-4 bg-slate-900 text-white rounded-2xl font-bold">Thêm</button>
        </div>
    </div>

    <script>
        // --- 1. CONFIG FIREBASE CỦA BẠN ---
        const firebaseConfig = {
            apiKey: "AIzaSyDRZFr7TnMJqDbEKtyR7T3zlspZYz8iNNw",
            authDomain: "appdiemdanh-c84a1.firebaseapp.com",
            projectId: "appdiemdanh-c84a1",
            databaseURL: "https://appdiemdanh-c84a1-default-rtdb.firebaseio.com", // Lưu ý: Cần link database của bạn
            storageBucket: "appdiemdanh-c84a1.firebasestorage.app",
            messagingSenderId: "729519978634",
            appId: "1:729519978634:web:2bd9fd826e9f67a7671573"
        };

        // Khởi tạo Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let students = [];
        let attendance = {};
        let scheduleType = '2-4-6';
        const vnDays = ["Chủ Nhật", "Thứ Hai", "Thứ Ba", "Thứ Tư", "Thứ Năm", "Thứ Sáu", "Thứ Bảy"];

        // --- 2. LẮNG NGHE DỮ LIỆU TỪ CLOUD ---
        db.ref('/').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            students = data.students || [];
            attendance = data.attendance || {};
            scheduleType = data.scheduleType || '2-4-6';
            
            document.getElementById('sync-status').innerText = "☁️ Đã đồng bộ trực tuyến";
            document.getElementById('sync-status').classList.replace('text-slate-400', 'text-emerald-500');
            
            renderAll();
        });

        // --- 3. CÁC HÀM XỬ LÝ DỮ LIỆU ---
        function saveAtt(sid, date, val) {
            document.getElementById('sync-status').innerText = "⚡ Đang lưu...";
            db.ref('attendance/' + `${sid}_${date}`).set(val);
        }

        function addStudent() {
            const name = document.getElementById('new-student-name').value;
            if (!name) return;
            const newStudents = [...students, { id: Date.now(), name: name }];
            db.ref('students').set(newStudents);
            document.getElementById('new-student-name').value = '';
        }

        function deleteStudent(id) {
            if (confirm('Xác nhận xóa học sinh này và toàn bộ dữ liệu liên quan?')) {
                const newStudents = students.filter(s => s.id !== id);
                db.ref('students').set(newStudents);
            }
        }

        function updateSettings() {
            const val = document.getElementById('schedule-select').value;
            db.ref('scheduleType').set(val);
        }

        // --- 4. HÀM HIỂN THỊ (RENDER) ---
        function checkIsWorkDay(date, type) {
            const d = date.getDay();
            if (type === '2-4-6') return [1, 3, 5].includes(d);
            if (type === '3-5-7') return [2, 4, 6].includes(d);
            return d !== 0; // all week
        }

        function renderAll() {
            renderAttendanceTable();
            renderStudentList();
        }

        function renderAttendanceTable() {
            const [y, m] = document.getElementById('month-filter').value.split('-');
            if (!y) return;
            const daysInMonth = new Date(y, m, 0).getDate();
            const header = document.getElementById('table-header');
            const body = document.getElementById('attendance-body');

            // Header
            header.innerHTML = `<th class="p-4 text-[10px] font-bold text-slate-400 sticky-col bg-slate-50 min-w-[140px]">HỌC SINH</th>`;
            for (let d = 1; d <= daysInMonth; d++) {
                const isWork = checkIsWorkDay(new Date(y, m - 1, d), scheduleType);
                header.innerHTML += `<th class="p-2 text-center min-w-[45px]">
                    <div class="text-[10px] font-bold ${isWork ? 'text-slate-600' : 'text-slate-200'}">${d}</div>
                </th>`;
            }

            // Body
            body.innerHTML = '';
            students.forEach(st => {
                let row = `<tr><td class="p-4 text-sm font-bold text-slate-700 sticky-col bg-white border-r">${st.name}</td>`;
                for (let d = 1; d <= daysInMonth; d++) {
                    const key = `${st.id}_${y}-${m}-${d}`;
                    const status = attendance[key] || '';
                    const isWork = checkIsWorkDay(new Date(y, m - 1, d), scheduleType);
                    
                    row += `<td class="p-1 text-center ${isWork ? '' : 'bg-slate-50/30'}">
                        ${isWork ? `
                        <select onchange="saveAtt('${st.id}', '${y}-${m}-${d}', this.value)" 
                            class="w-9 h-9 text-xs rounded-xl text-center font-bold transition-all
                            ${status === '✅' ? 'pastel-green' : status === '❌' ? 'pastel-red' : status === '⏰' ? 'pastel-yellow' : 'bg-slate-50 text-slate-300'}">
                            <option value="">-</option>
                            <option value="✅" ${status === '✅' ? 'selected' : ''}>✅</option>
                            <option value="❌" ${status === '❌' ? 'selected' : ''}>❌</option>
                            <option value="⏰" ${status === '⏰' ? 'selected' : ''}>⏰</option>
                        </select>` : ''}
                    </td>`;
                }
                body.innerHTML += row + `</tr>`;
            });
        }

        function renderStudentList() {
            document.getElementById('student-list').innerHTML = students.map(s => `
                <div class="flex justify-between items-center p-4 glass rounded-2xl">
                    <span class="text-sm font-semibold">${s.name}</span>
                    <button onclick="deleteStudent(${s.id})" class="text-red-400 text-xs font-bold">Xóa</button>
                </div>
            `).join('');
        }

        function exportToExcel() {
            const [y, m] = document.getElementById('month-filter').value.split('-');
            const daysInMonth = new Date(y, m, 0).getDate();
            let headers = ["Học sinh"];
            for (let d = 1; d <= daysInMonth; d++) headers.push(d.toString());
            headers.push("Có mặt", "Vắng", "Trễ");

            let data = [headers];
            students.forEach(st => {
                let row = [st.name];
                let cP = 0, cA = 0, cL = 0;
                for (let d = 1; d <= daysInMonth; d++) {
                    const status = attendance[`${st.id}_${y}-${m}-${d}`] || "";
                    row.push(status);
                    if(status === "✅") cP++;
                    if(status === "❌") cA++;
                    if(status === "⏰") cL++;
                }
                row.push(cP, cA, cL);
                data.push(row);
            });

            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "DiemDanh");
            XLSX.writeFile(wb, `Diem_Danh_Thang_${m}.xlsx`);
        }

        // Khởi tạo ngày tháng
        const now = new Date();
        document.getElementById('month-filter').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        document.getElementById('schedule-select').value = scheduleType;
    </script>
</body>
</html>
