<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📊 Điểm danh Thông minh - Firebase</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Excel Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' },
                        accent: { 50: '#fef3c7', 500: '#f59e0b', 600: '#d97706' },
                        danger: { 50: '#fef2f2', 500: '#ef4444', 600: '#dc2626' }
                    },
                    animation: { 'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite' }
                }
            }
        }
    </script>
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        .glass-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            border: 1px solid rgba(226,232,240,0.8);
            transition: all 0.2s ease;
        }
        .glass-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        
        .sticky-col { 
            position: sticky; left: 0; z-index: 25; 
            background: linear-gradient(90deg, white 95%, transparent);
            border-right: 2px solid #e2e8f0;
            box-shadow: 4px 0 12px rgba(0,0,0,0.03);
        }
        
        /* Status colors với gradient */
        .status-present { background: linear-gradient(135deg, #dcfce7, #bbf7d0); color: #166534; border: 2px solid #86efac; }
        .status-absent { background: linear-gradient(135deg, #fee2e2, #fecaca); color: #991b1b; border: 2px solid #fca5a5; }
        .status-late { background: linear-gradient(135deg, #fef9c3, #fef08a); color: #854d0e; border: 2px solid #fde047; }
        .status-empty { background: #f8fafc; color: #cbd5e1; border: 2px dashed #e2e8f0; }
        
        /* Today highlight */
        .today-col { 
            position: relative;
            background: linear-gradient(180deg, #dbeafe, #bfdbfe) !important;
            border-radius: 12px;
            box-shadow: inset 0 0 0 2px #3b82f6, 0 4px 12px rgba(59,130,246,0.15);
        }
        .today-col::after {
            content: "Hôm nay";
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            font-weight: 700;
            color: #2563eb;
            background: white;
            padding: 2px 8px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            white-space: nowrap;
        }
        
        /* Custom select */
        select {
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
        
        /* Smooth scroll & transitions */
        * { scroll-behavior: smooth; }
        .btn-press { transition: transform 0.1s; }
        .btn-press:active { transform: scale(0.98); }
        
        /* Summary card animation */
        @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .summary-card { animation: slideIn 0.3s ease-out forwards; }
        
        /* Loading skeleton */
        .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pb-32">

    <!-- HEADER -->
    <header class="sticky top-0 z-40 bg-white/95 backdrop-blur-lg border-b border-slate-100 shadow-sm">
        <div class="px-5 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-lg md:text-xl font-extrabold bg-gradient-to-r from-emerald-600 to-teal-600 bg-clip-text text-transparent">
                    🍎 Lớp Anh Trần Thị Anh
                </h1>
                <div id="sync-status" class="flex items-center gap-1.5 mt-1">
                    <span class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></span>
                    <span class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider">Đang kết nối...</span>
                </div>
            </div>
            <button onclick="exportToExcel()" class="btn-press bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white px-4 py-2.5 rounded-2xl text-sm font-bold shadow-lg shadow-emerald-200/50 flex items-center gap-2">
                <span>📊</span> Xuất Excel
            </button>
        </div>
    </header>

    <!-- BỘ LỌC & CONTROLS -->
    <div class="px-4 py-3 space-y-3">
        <div class="flex gap-2">
            <select id="schedule-select" onchange="updateSettings()" class="flex-1 glass p-3.5 rounded-2xl text-sm font-semibold outline-none border-none shadow-sm focus:ring-2 focus:ring-emerald-200 transition-all">
                <option value="2-4-6">📅 Thứ 2-4-6</option>
                <option value="3-5-7">📅 Thứ 3-5-7</option>
                <option value="all">🗓️ Cả tuần (bao gồm CN)</option>
            </select>
            <input type="month" id="month-filter" onchange="renderAll()" class="flex-1 glass p-3.5 rounded-2xl text-sm font-semibold outline-none border-none shadow-sm focus:ring-2 focus:ring-emerald-200 transition-all">
        </div>
        
        <!-- Quick Stats -->
        <div id="quick-stats" class="grid grid-cols-3 gap-2 text-center">
            <div class="glass-card p-3 rounded-2xl">
                <div class="text-lg font-extrabold text-emerald-600" id="stat-present">0</div>
                <div class="text-[10px] text-slate-400 font-medium">Có mặt</div>
            </div>
            <div class="glass-card p-3 rounded-2xl">
                <div class="text-lg font-extrabold text-amber-500" id="stat-late">0</div>
                <div class="text-[10px] text-slate-400 font-medium">Trễ</div>
            </div>
            <div class="glass-card p-3 rounded-2xl">
                <div class="text-lg font-extrabold text-red-500" id="stat-absent">0</div>
                <div class="text-[10px] text-slate-400 font-medium">Vắng</div>
            </div>
        </div>
    </div>

    <!-- BẢNG ĐIỂM DANH -->
    <main class="px-4">
        <div class="glass-card rounded-3xl overflow-hidden shadow-xl overflow-x-auto">
            <table class="w-full text-left border-collapse bg-white min-w-[600px]">
                <thead class="bg-gradient-to-r from-slate-50 to-slate-100/80">
                    <tr id="table-header">
                        <th class="p-4 text-[10px] font-extrabold text-slate-400 uppercase tracking-wider sticky-col bg-gradient-to-r from-slate-50 to-slate-100 min-w-[150px] border-r">
                            👤 Học sinh
                        </th>
                    </tr>
                </thead>
                <tbody id="attendance-body" class="divide-y divide-slate-50"></tbody>
            </table>
        </div>
    </main>

    <!-- 🔹 TỔNG KẾT THEO THÁNG -->
    <section class="px-4 mt-6" id="summary-section">
        <div class="glass-card rounded-3xl p-5">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-extrabold text-lg text-slate-800 flex items-center gap-2">
                    <span>📈</span> 
                    <span id="summary-title">Tổng kết tháng</span>
                </h3>
                <span class="text-xs font-semibold px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full" id="summary-period">Tháng 5/2026</span>
            </div>
            
            <div id="summary-list" class="space-y-3 max-h-80 overflow-y-auto pr-2">
                <!-- Summary items will be injected here -->
            </div>
        </div>
    </section>

    <!-- QUẢN LÝ HỌC SINH -->
    <div class="px-4 py-6 space-y-4">
        <h3 class="font-bold text-slate-700 flex items-center gap-2">
            <span>👥</span> Danh sách học sinh
        </h3>
        <div id="student-list" class="grid grid-cols-1 gap-2"></div>
        
        <div class="flex gap-2">
            <input type="text" id="new-student-name" placeholder="Nhập tên học sinh mới..." 
                class="flex-1 p-4 rounded-2xl glass outline-none text-sm focus:ring-2 focus:ring-emerald-200 transition-all"
                onkeypress="if(event.key==='Enter')addStudent()">
            <button onclick="addStudent()" class="btn-press px-6 py-4 bg-gradient-to-r from-slate-800 to-slate-700 hover:from-slate-900 hover:to-slate-800 text-white rounded-2xl font-bold shadow-lg">
                ➕ Thêm
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 hidden">
        <div class="glass px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-3 animate-slide-up">
            <span id="toast-icon" class="text-lg">✅</span>
            <span id="toast-msg" class="text-sm font-semibold text-slate-700">Đã lưu thành công!</span>
        </div>
    </div>

    <script>
        // === FIREBASE CONFIG ===
        const firebaseConfig = {
            apiKey: "AIzaSyDRZFr7TnMJqDbEKtyR7T3zlspZYz8iNNw",
            authDomain: "appdiemdanh-c84a1.firebaseapp.com",
            projectId: "appdiemdanh-c84a1",
            databaseURL: "https://appdiemdanh-c84a1-default-rtdb.asia-southeast1.firebasedatabase.app/",
            storageBucket: "appdiemdanh-c84a1.firebasestorage.app",
            messagingSenderId: "729519978634",
            appId: "1:729519978634:web:2bd9fd826e9f67a7671573"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // === GLOBAL STATE ===
        let students = [], attendance = {}, scheduleType = '2-4-6';
        const vnDays = ["CN", "T2", "T3", "T4", "T5", "T6", "T7"];
        const statusMap = { '✅': 'present', '❌': 'absent', '⏰': 'late' };
        const today = new Date();

        // === SYNC STATUS ===
        db.ref('/').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            students = data.students || [];
            attendance = data.attendance || {};
            scheduleType = data.scheduleType || '2-4-6';
            
            const statusEl = document.getElementById('sync-status');
            statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500"></span><span class="text-[10px] font-semibold text-emerald-600 uppercase tracking-wider">● Đã đồng bộ</span>`;
            renderAll();
            updateQuickStats();
        });

        // === CORE FUNCTIONS ===
        function checkIsWorkDay(date, type) {
            const d = date.getDay(); // 0 = Chủ Nhật
            if (type === '2-4-6') return [1, 3, 5].includes(d);
            if (type === '3-5-7') return [2, 4, 6].includes(d);
            return true; // 'all': bao gồm cả Chủ Nhật ✅
        }

        function isToday(date) {
            return date.getDate() === today.getDate() &&
                   date.getMonth() === today.getMonth() &&
                   date.getFullYear() === today.getFullYear();
        }

        function showToast(msg, icon = '✅', type = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            document.getElementById('toast-icon').textContent = icon;
            toast.className = `fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex ${type === 'error' ? 'text-red-600' : 'text-emerald-600'}`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2500);
        }

        function saveAtt(sid, date, val) {
            const statusEl = document.getElementById('sync-status');
            statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></span><span class="text-[10px] font-semibold text-amber-600">Đang lưu...</span>`;
            
            db.ref('attendance/' + `${sid}_${date}`).set(val)
                .then(() => {
                    statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500"></span><span class="text-[10px] font-semibold text-emerald-600">● Đã lưu</span>`;
                    showToast('Đã cập nhật điểm danh!');
                    updateQuickStats();
                    renderSummary();
                })
                .catch(() => {
                    statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-500"></span><span class="text-[10px] font-semibold text-red-600">● Lỗi kết nối</span>`;
                    showToast('Lỗi lưu dữ liệu!', '❌', 'error');
                });
        }

        function addStudent() {
            const input = document.getElementById('new-student-name');
            const name = input.value.trim();
            if (!name) { showToast('Vui lòng nhập tên!', '⚠️', 'error'); return; }
            
            const newStudents = [...students, { id: Date.now(), name }];
            db.ref('students').set(newStudents)
                .then(() => {
                    input.value = '';
                    showToast('Đã thêm học sinh! ✨');
                });
        }

        function deleteStudent(id) {
            if (confirm('⚠️ Xóa học sinh này sẽ mất toàn bộ lịch sử điểm danh. Bạn chắc chắn?')) {
                const newStudents = students.filter(s => s.id !== id);
                // Xóa cả attendance liên quan
                Object.keys(attendance).forEach(key => {
                    if (key.startsWith(`${id}_`)) delete attendance[key];
                });
                db.ref('students').set(newStudents);
                db.ref('attendance').set(attendance);
                showToast('Đã xóa học sinh');
            }
        }

        function updateSettings() {
            const val = document.getElementById('schedule-select').value;
            db.ref('scheduleType').set(val);
            showToast('Đã cập nhật lịch học! 📅');
        }

        // === RENDER FUNCTIONS ===
        function renderAll() {
            renderAttendanceTable();
            renderStudentList();
            renderSummary();
            updateQuickStats();
        }

        function renderAttendanceTable() {
            const monthVal = document.getElementById('month-filter').value;
            if (!monthVal) return;
            
            const [y, m] = monthVal.split('-').map(Number);
            const daysInMonth = new Date(y, m, 0).getDate();
            const header = document.getElementById('table-header');
            const body = document.getElementById('attendance-body');

            // Render header
            header.innerHTML = `<th class="p-4 text-[10px] font-extrabold text-slate-400 uppercase tracking-wider sticky-col bg-gradient-to-r from-slate-50 to-slate-100 min-w-[150px] border-r">👤 Học sinh</th>`;
            
            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(y, m - 1, d);
                const dayIndex = dateObj.getDay();
                const isWork = checkIsWorkDay(dateObj, scheduleType);
                const isTodayFlag = isToday(dateObj);
                
                header.innerHTML += `
                    <th class="p-2 text-center min-w-[48px] relative ${isTodayFlag ? 'today-col' : ''}">
                        <div class="text-[10px] font-extrabold ${isWork ? (isTodayFlag ? 'text-blue-700' : 'text-slate-600') : 'text-slate-200'}">
                            ${d}
                        </div>
                        <div class="text-[9px] font-medium text-slate-300 mt-0.5">${vnDays[dayIndex]}</div>
                    </th>`;
            }

            // Render body
            body.innerHTML = '';
            students.forEach(st => {
                let row = `<tr class="hover:bg-slate-50/60 transition-colors"><td class="p-4 text-sm font-bold text-slate-700 sticky-col bg-white border-r flex items-center gap-2">
                    <span class="w-7 h-7 rounded-full bg-gradient-to-br from-emerald-100 to-teal-100 flex items-center justify-center text-xs font-extrabold text-emerald-700">
                        ${st.name.charAt(0).toUpperCase()}
                    </span>
                    ${st.name}
                </td>`;
                
                for (let d = 1; d <= daysInMonth; d++) {
                    const key = `${st.id}_${y}-${String(m).padStart(2,'0')}-${d}`;
                    const status = attendance[key] || '';
                    const dateObj = new Date(y, m - 1, d);
                    const isWork = checkIsWorkDay(dateObj, scheduleType);
                    const isTodayFlag = isToday(dateObj);
                    const statusClass = statusMap[status] || 'empty';
                    
                    row += `<td class="p-1.5 text-center ${!isWork ? 'bg-slate-50/30' : ''} ${isTodayFlag && isWork ? 'rounded-xl' : ''}">
                        ${isWork ? `
                        <select onchange="saveAtt('${st.id}', '${y}-${String(m).padStart(2,'0')}-${d}', this.value)" 
                            class="w-10 h-10 text-xs rounded-xl text-center font-bold transition-all cursor-pointer
                            ${status ? `status-${statusClass}` : 'status-empty hover:border-emerald-300'}"
                            style="background-image: none;">
                            <option value="">○</option>
                            <option value="✅" ${status==='✅'?'selected':''}>✅</option>
                            <option value="❌" ${status==='❌'?'selected':''}>❌</option>
                            <option value="⏰" ${status==='⏰'?'selected':''}>⏰</option>
                        </select>` : '<span class="text-slate-200 text-lg">•</span>'}
                    </td>`;
                }
                row += '</tr>';
                body.innerHTML += row;
            });
        }

        function renderStudentList() {
            const container = document.getElementById('student-list');
            if (students.length === 0) {
                container.innerHTML = `<div class="text-center py-6 text-slate-400 text-sm">Chưa có học sinh nào</div>`;
                return;
            }
            container.innerHTML = students.map(s => `
                <div class="glass-card flex justify-between items-center p-4 rounded-2xl group">
                    <div class="flex items-center gap-3">
                        <span class="w-8 h-8 rounded-full bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center text-sm font-bold text-slate-600">
                            ${s.name.charAt(0).toUpperCase()}
                        </span>
                        <span class="text-sm font-semibold text-slate-700">${s.name}</span>
                    </div>
                    <button onclick="deleteStudent(${s.id})" 
                        class="text-red-300 hover:text-red-500 text-xs font-bold opacity-0 group-hover:opacity-100 transition-all btn-press px-3 py-1.5 rounded-xl hover:bg-red-50">
                        Xóa
                    </button>
                </div>
            `).join('');
        }

        // === 🔹 HÀM TỔNG KẾT MỚI ===
        function renderSummary() {
            const monthVal = document.getElementById('month-filter').value;
            if (!monthVal) return;
            
            const [y, m] = monthVal.split('-').map(Number);
            const monthNames = ["Tháng 1", "Tháng 2", "Tháng 3", "Tháng 4", "Tháng 5", "Tháng 6", 
                               "Tháng 7", "Tháng 8", "Tháng 9", "Tháng 10", "Tháng 11", "Tháng 12"];
            
            document.getElementById('summary-title').textContent = `📈 ${monthNames[m-1]}: Tổng kết điểm danh`;
            document.getElementById('summary-period').textContent = `${m}/${y}`;
            
            const container = document.getElementById('summary-list');
            container.innerHTML = '';
            
            if (students.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-slate-400 text-sm">Chưa có dữ liệu</div>`;
                return;
            }
            
            students.forEach((st, index) => {
                const attendedDates = [];
                let presentCount = 0, absentCount = 0, lateCount = 0;
                
                const daysInMonth = new Date(y, m, 0).getDate();
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateObj = new Date(y, m-1, d);
                    if (!checkIsWorkDay(dateObj, scheduleType)) continue;
                    
                    const key = `${st.id}_${y}-${String(m).padStart(2,'0')}-${d}`;
                    const status = attendance[key];
                    
                    if (status === '✅') { presentCount++; attendedDates.push(d); }
                    else if (status === '❌') absentCount++;
                    else if (status === '⏰') lateCount++;
                }
                
                const totalSessions = attendedDates.length + absentCount + lateCount;
                const attendanceRate = totalSessions > 0 ? Math.round((presentCount / totalSessions) * 100) : 0;
                
                // Màu sắc theo tỷ lệ chuyên cần
                const rateColor = attendanceRate >= 90 ? 'text-emerald-600 bg-emerald-50' : 
                                 attendanceRate >= 70 ? 'text-amber-600 bg-amber-50' : 'text-red-600 bg-red-50';
                
                container.innerHTML += `
                    <div class="glass-card p-4 rounded-2xl summary-card" style="animation-delay: ${index * 50}ms">
                        <div class="flex items-start justify-between mb-3">
                            <div class="flex items-center gap-3">
                                <span class="w-10 h-10 rounded-2xl bg-gradient-to-br from-emerald-100 to-teal-100 flex items-center justify-center text-sm font-extrabold text-emerald-700">
                                    ${st.name.charAt(0).toUpperCase()}
                                </span>
                                <div>
                                    <div class="font-bold text-slate-800">${st.name}</div>
                                    <div class="text-xs text-slate-400">${attendedDates.length} buổi đã điểm danh</div>
                                </div>
                            </div>
                            <span class="px-3 py-1.5 rounded-xl text-xs font-extrabold ${rateColor}">
                                ${attendanceRate}% chuyên cần
                            </span>
                        </div>
                        
                        <div class="grid grid-cols-3 gap-2 mb-3 text-center">
                            <div class="p-2 rounded-xl bg-emerald-50">
                                <div class="text-lg font-extrabold text-emerald-600">${presentCount}</div>
                                <div class="text-[10px] text-emerald-700/70">Có mặt</div>
                            </div>
                            <div class="p-2 rounded-xl bg-amber-50">
                                <div class="text-lg font-extrabold text-amber-600">${lateCount}</div>
                                <div class="text-[10px] text-amber-700/70">Trễ</div>
                            </div>
                            <div class="p-2 rounded-xl bg-red-50">
                                <div class="text-lg font-extrabold text-red-600">${absentCount}</div>
                                <div class="text-[10px] text-red-700/70">Vắng</div>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-semibold text-slate-400 uppercase">📅 Ngày đi học:</span>
                            <div class="flex flex-wrap gap-1.5">
                                ${attendedDates.length > 0 
                                    ? attendedDates.map(day => `<span class="px-2 py-0.5 bg-slate-100 text-slate-600 text-[10px] font-bold rounded-lg">${day}</span>`).join('')
                                    : '<span class="text-[10px] text-slate-300 italic">Chưa có dữ liệu</span>'
                                }
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function updateQuickStats() {
            const monthVal = document.getElementById('month-filter').value;
            if (!monthVal) return;
            
            const [y, m] = monthVal.split('-').map(Number);
            let totalPresent = 0, totalAbsent = 0, totalLate = 0;
            
            const daysInMonth = new Date(y, m, 0).getDate();
            students.forEach(st => {
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateObj = new Date(y, m-1, d);
                    if (!checkIsWorkDay(dateObj, scheduleType)) continue;
                    
                    const key = `${st.id}_${y}-${String(m).padStart(2,'0')}-${d}`;
                    const status = attendance[key];
                    if (status === '✅') totalPresent++;
                    else if (status === '❌') totalAbsent++;
                    else if (status === '⏰') totalLate++;
                }
            });
            
            document.getElementById('stat-present').textContent = totalPresent;
            document.getElementById('stat-absent').textContent = totalAbsent;
            document.getElementById('stat-late').textContent = totalLate;
        }

        // === EXPORT EXCEL NÂNG CẤP ===
        function exportToExcel() {
            const monthVal = document.getElementById('month-filter').value;
            if (!monthVal) { showToast('Vui lòng chọn tháng!', '⚠️', 'error'); return; }
            
            const [y, m] = monthVal.split('-').map(Number);
            const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
            const daysInMonth = new Date(y, m, 0).getDate();
            
            // Header row
            let headers = ["STT", "Học sinh"];
            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(y, m-1, d);
                if (checkIsWorkDay(dateObj, scheduleType)) {
                    headers.push(`${d}/${m} (${vnDays[dateObj.getDay()]})`);
                }
            }
            headers.push("✅ Có mặt", "⏰ Trễ", "❌ Vắng", "% Chuyên cần", "Ngày đi học");

            let data = [headers];
            students.forEach((st, idx) => {
                let row = [idx + 1, st.name];
                let cP = 0, cA = 0, cL = 0, attendedDates = [];
                
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateObj = new Date(y, m-1, d);
                    if (!checkIsWorkDay(dateObj, scheduleType)) continue;
                    
                    const status = attendance[`${st.id}_${y}-${String(m).padStart(2,'0')}-${d}`] || "";
                    row.push(status || "-");
                    
                    if(status === "✅") { cP++; attendedDates.push(d); }
                    if(status === "❌") cA++;
                    if(status === "⏰") cL++;
                }
                
                const total = cP + cA + cL;
                const rate = total > 0 ? Math.round((cP / total) * 100) + "%" : "0%";
                row.push(cP, cL, cA, rate, attendedDates.join(", "));
                data.push(row);
            });

            const ws = XLSX.utils.aoa_to_sheet(data);
            // Set column widths
            ws['!cols'] = [{wch: 5}, {wch: 25}, ...Array(headers.length - 6).fill({wch: 8}), {wch: 10}, {wch: 8}, {wch: 8}, {wch: 12}, {wch: 30}];
            
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, `DiemDanh_${monthNames[m-1]}${y}`);
            XLSX.writeFile(wb, `DiemDanh_${monthNames[m-1]}_${y}.xlsx`);
            showToast('Đã xuất file Excel! 📁');
        }

        // === INIT ===
        document.addEventListener('DOMContentLoaded', () => {
            // Set default month to current
            const now = new Date();
            const defaultMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            document.getElementById('month-filter').value = defaultMonth;
            document.getElementById('schedule-select').value = scheduleType;
            
            // Auto-render when page loads
            renderAll();
        });

        // Handle keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'e') { e.preventDefault(); exportToExcel(); }
            if (e.key === 'Enter' && document.activeElement.id === 'new-student-name') addStudent();
        });
    </script>
</body>
</html>
